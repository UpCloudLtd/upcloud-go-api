name: Credentials test

on:
  pull_request:
    paths:
      - '.github/workflows/credentials.yml'
      - 'credentials/**'

permissions: {}

jobs:
  unittest:
    strategy:
      matrix:
        go-version: [1.24.x, 1.25.x, 1.26.x]
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}
      - name: Install keyring test dependencies on Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y gnome-keyring build-essential ca-certificates
        if: matrix.os == 'ubuntu-latest'
      - name: Run tests on Ubuntu with keyring
        env:
          GOTOOLCHAIN: auto
        run: | 
          echo 'somecredstorepass' | gnome-keyring-daemon --unlock
          cd credentials
          go test .
        shell: dbus-run-session -- bash --noprofile --norc -eo pipefail {0}
        if: matrix.os == 'ubuntu-latest'
      - name: Run tests
        env:
          GOTOOLCHAIN: auto
        run: |
          cd credentials
          go test .
        if: matrix.os != 'ubuntu-latest'
